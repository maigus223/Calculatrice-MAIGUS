<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12141A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dɔŋɔj Calc">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-192.png">
<title>Essaie de chiffres (MAIGUS) — Calculatrice RTL</title>
<style>
  :root{
    --ink: #12141A;
    --panel: #1B1E27;
    --panel-2: #21252F;
    --border: #2E323D;
    --brass: #C89B4C;
    --brass-dim: #8C6F38;
    --teal: #4E8C82;
    --text: #EDE8DC;
    --text-muted: #8B8FA3;
    --danger: #B25646;
    --font-utility: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --font-display: Georgia, 'Iowan Old Style', serif;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; min-height:100%;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(200,155,74,0.08), transparent 60%),
      var(--ink);
    color: var(--text);
    font-family: var(--font-utility);
    -webkit-tap-highlight-color: transparent;
  }
  .wrap{ max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }

  header{ text-align:center; margin-bottom: 18px; }
  header .eyebrow{
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--teal); margin-bottom: 6px;
  }
  header h1{ font-family: var(--font-display); font-weight: 400; font-size: 26px; margin: 0; color: var(--brass); }
  header p{ color: var(--text-muted); font-size: 13px; margin: 6px 0 0; line-height:1.5; }

  .card{ background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }

  /* --- Display --- */
  .display{ background: var(--ink); border: 1px solid var(--border); border-radius: 8px; padding: 18px 16px 14px; margin-bottom: 14px; }
  .seq{
    display:flex; flex-direction: row-reverse; align-items:center; flex-wrap: nowrap;
    overflow-x:auto; gap: 4px;
  }
  .expr-line.seq{ min-height: 20px; }
  .expr-line .u{ font-size: 14px; color: var(--text-muted); }
  .expr-line img{ height: 16px; width:auto; opacity:.75; }
  .main-line.seq{ min-height: 48px; margin-top: 4px; }
  .main-line .u{ font-size: 40px; line-height:1; color: var(--text); }
  .main-line img{ height: 42px; width:auto; }
  .u.sep{ color: var(--brass-dim); font-size: 0.5em; align-self: center; margin: 0 1px; }
  .u.dec{ display:inline-block; transform: scaleX(-1); }
  .rtl-tag{
    display:inline-block; margin-top:8px; font-size: 10px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--brass-dim);
    border: 1px solid var(--brass-dim); border-radius: 20px; padding: 2px 8px;
  }

  /* --- Keypad --- */
  .keypad{ display:grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  button.key{
    font-family: var(--font-utility);
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 12px 0; font-size: 15px; cursor:pointer; user-select:none;
  }
  button.key:active{ background: #2B303C; }
  button.key.digit{ display:flex; align-items:center; justify-content:center; min-height: 54px; }
  button.key.digit img{ height: 30px; width:auto; }
  button.key.digit .fallback{ font-size: 20px; }
  button.key.op{ color: var(--brass); font-size: 20px; }
  button.key.equals{ background: var(--brass); color: var(--ink); font-weight:bold; border-color: var(--brass); }
  button.key.equals:active{ background: var(--brass-dim); }
  button.key.clear{ color: var(--danger); }

  footer{ text-align:center; font-size: 11px; color: var(--text-muted); margin-top: 24px; line-height:1.6; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Songhay (__________)</div>
    <h1>Calculatrice MAIGUS</h1>
    <p>Affichage et saisie en droite-à-gauche.<br>Bon essai.</p>
  </header>

  <div class="card">
    <div class="display">
      <div class="expr-line seq" id="exprLine"></div>
      <div class="main-line seq" id="mainLine"></div>
      <span class="rtl-tag">RTL actif</span>
    </div>
    <div class="keypad" id="keypad"></div>
  </div>

  <footer>
    Fichier autonome — ESSAI & ADAPTATION.<br>
    Officialisation en cours...
  </footer>
</div>

  let digitImages = DEFAULT_IMAGES;
  let entry = '0';
  let previous = null;
  let operator = null;
  let justEvaluated = false;
  let exprText = '';

  // --- render helpers: build a right-to-left sequence of chars/images ---
  function buildSeq(container, str, unitClass, imgHeightClass){
    container.innerHTML = '';
    for(const ch of str){
      if(ch >= '0' && ch <= '9'){
        const idx = parseInt(ch,10);
        if(digitImages[idx]){
          const img = document.createElement('img');
          img.src = digitImages[idx];
          container.appendChild(img);
          continue;
        }
      }
      const span = document.createElement('span');
      if(ch === THOUSANDS_SEP){
        span.className = unitClass + ' sep';
        span.textContent = '\u00B7'; // point médian — repère visuel du groupement de 3
      } else if(ch === '.'){
        span.className = unitClass + ' dec';
        span.textContent = ',';
      } else {
        span.className = unitClass;
        span.textContent = (ch === '-' ? '−' : ch);
      }
      container.appendChild(span);
    }
  }

  function fmt(num){
    if(!isFinite(num)) return 'ERR';
    let s = Math.round(num * 1e10) / 1e10;
    return String(s);
  }
  function calculate(a,b,op){
    switch(op){
      case '+': return a+b;
      case '−': return a-b;
      case '×': return a*b;
      case '÷': return b===0 ? NaN : a/b;
    }
  }

  const THOUSANDS_SEP = '\u202F'; // espace fine — insérée entre les groupes de 3 chiffres
  function groupInteger(intPart){
    let out = '';
    for(let i=0;i<intPart.length;i++){
      if(i>0 && (intPart.length-i)%3===0) out += THOUSANDS_SEP;
      out += intPart[i];
    }
    return out;
  }
  function formatNumberToken(token){
    const neg = token.startsWith('-');
    if(neg) token = token.slice(1);
    const dot = token.indexOf('.');
    const intPart = dot===-1 ? token : token.slice(0,dot);
    const decPart = dot===-1 ? null : token.slice(dot+1);
    const grouped = groupInteger(intPart) + (decPart!==null ? '.'+decPart : '');
    return (neg?'-':'') + grouped;
  }
  function withThousands(str){
    return str.replace(/-?\d+(\.\d+)?/g, m => formatNumberToken(m));
  }

  function render(){
    buildSeq(document.getElementById('mainLine'), withThousands(entry), 'u');
    buildSeq(document.getElementById('exprLine'), withThousands(exprText), 'u');
  }

  function pressDigit(d){
    if(justEvaluated){ entry='0'; exprText=''; justEvaluated=false; }
    entry = (entry === '0') ? d : entry + d;
  }
  function pressDecimal(){
    if(justEvaluated){ entry='0'; exprText=''; justEvaluated=false; }
    if(!entry.includes('.')) entry += '.';
  }
  function pressOperator(op){
    if(operator && !justEvaluated){
      previous = calculate(previous, parseFloat(entry), operator);
    } else {
      previous = parseFloat(entry);
    }
    operator = op;
    exprText = fmt(previous) + op;
    entry = '0';
    justEvaluated = false;
  }
  function pressEquals(){
    if(operator === null) return;
    const b = parseFloat(entry);
    const result = calculate(previous, b, operator);
    exprText = fmt(previous) + operator + fmt(b) + '=';
    entry = isNaN(result) ? 'ERR' : fmt(result);
    previous = null; operator = null; justEvaluated = true;
  }
  function pressClear(){ entry='0'; previous=null; operator=null; exprText=''; justEvaluated=false; }
  function pressBackspace(){
    if(justEvaluated){ pressClear(); return; }
    entry = entry.length > 1 ? entry.slice(0,-1) : '0';
  }

  // --- build keypad ---
  const keypad = document.getElementById('keypad');
  const layout = [
    ['C','clear'], ['⌫','back'], [',','dec'], ['÷','op'],
    ['9','d'], ['8','d'], ['7','d'], ['×','op'],
    ['6','d'], ['5','d'], ['4','d'], ['−','op'],
    ['3','d'], ['2','d'], ['1','d'], ['+','op'],
    ['0','d'], ['=','eq']
  ];
  layout.forEach(([label,type])=>{
    const btn = document.createElement('button');
    btn.className = 'key';
    if(type==='clear'){ btn.classList.add('clear'); btn.textContent='C'; btn.onclick=()=>{pressClear(); render();}; }
    else if(type==='back'){ btn.textContent='⌫'; btn.onclick=()=>{pressBackspace(); render();}; }
    else if(type==='dec'){ btn.classList.add('op'); btn.textContent=','; btn.onclick=()=>{pressDecimal(); render();}; }
    else if(type==='op'){ btn.classList.add('op'); btn.textContent=label; btn.onclick=()=>{pressOperator(label); render();}; }
    else if(type==='eq'){ btn.classList.add('equals'); btn.textContent='='; btn.style.gridColumn='span 2'; btn.onclick=()=>{pressEquals(); render();}; }
    else if(type==='d'){
      const d = label;
      btn.classList.add('digit');
      btn.dataset.d = d;
      renderDigitButton(btn, d);
      if(d==='0') btn.style.gridColumn='span 2';
      btn.onclick=()=>{pressDigit(d); render();};
    }
    keypad.appendChild(btn);
  });

  function renderDigitButton(btn, d){
    const idx = parseInt(d,10);
    const img = digitImages[idx];
    btn.innerHTML = img
      ? `<img src="${img}">`
      : `<span class="fallback">${d}</span>`;
  }

  render();
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
