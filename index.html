<title>Essaie de chiffres (MAIGUS) — Calculatrice RTL</title>
<style>
  :root{
    --night: #171335;
    --night-2: #1F1A45;
    --dune: #272052;
    --dune-2: #302962;
    --border: #423876;
    --sand: #F1E4C8;
    --sand-dim: #C9B98C;
    --ochre: #E3A857;
    --ochre-dim: #A97A38;
    --river: #3FA79A;
    --river-dim: #276F65;
    --clay: #C1502E;
    --text: #F1E4C8;
    --text-muted: #9C93C4;
    --screen-bg: #FBF3DF;
    --screen-bg-2: #F4E9CB;
    --screen-text: #201A3E;
    --screen-text-muted: #6B5D8C;
    --font-utility: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --font-display: Georgia, 'Iowan Old Style', serif;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; min-height:100%;
    background:
      radial-gradient(900px 500px at 85% -8%, rgba(227,168,87,0.16), transparent 60%),
      radial-gradient(700px 500px at 8% 105%, rgba(63,167,154,0.14), transparent 55%),
      linear-gradient(180deg, var(--night) 0%, var(--night-2) 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--font-utility);
    -webkit-tap-highlight-color: transparent;
  }
  .wrap{ max-width: 480px; margin: 0 auto; padding: 28px 16px 60px; }

  header{ text-align:center; margin-bottom: 20px; }
  header .eyebrow{
    font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--river); margin-bottom: 8px; font-weight: 600;
  }
  header h1{
    font-family: var(--font-display); font-weight: 400; font-size: 30px; margin: 0;
    color: var(--ochre); letter-spacing: .01em;
  }
  header p{ color: var(--text-muted); font-size: 13px; margin: 8px 0 0; line-height:1.6; }

  .card{
    background: linear-gradient(165deg, var(--dune) 0%, var(--dune-2) 100%);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 18px;
    box-shadow: 0 20px 40px -20px rgba(9, 6, 26, 0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  /* --- Display --- */
  .display{
    background: linear-gradient(165deg, var(--screen-bg) 0%, var(--screen-bg-2) 100%);
    border: 1px solid #D8C79A;
    border-radius: 14px;
    padding: 20px 18px 16px;
    margin-bottom: 16px;
    box-shadow: inset 0 2px 8px rgba(90, 70, 30, 0.15);
  }
  .seq{
    display:flex; flex-direction: row-reverse; align-items:center; flex-wrap: nowrap;
    overflow-x:auto; gap: 0.3px; scrollbar-width: none;
  }
  .seq::-webkit-scrollbar{ display:none; }
  .expr-line.seq{ min-height: 20px; }
  .expr-line .u{ font-size: 18px; color: var(--screen-text-muted); }
  .expr-line img{ height: 22px; width:auto; mix-blend-mode: multiply; opacity: .85; }
  .main-line.seq{ min-height: 62px; margin-top: 6px; }
  .main-line .u{ font-size: 54px; line-height:1; color: var(--screen-text); }
  .main-line img{ height: 56px; width:auto; mix-blend-mode: multiply; }
  .u.sep{ color: var(--clay); font-size: 0.55em; align-self: center; margin: 0 2px; }
  .u.dec{ display:inline-block; transform: scaleX(-1); color: var(--clay); }
  .rtl-tag{
    display:inline-block; margin-top:10px; font-size: 10px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--river-dim);
    border: 1px solid var(--river-dim); border-radius: 20px; padding: 3px 10px;
    background: rgba(63,167,154,0.12);
  }

  /* --- Keypad --- */
  .keypad{ display:grid; grid-template-columns: repeat(4, 1fr); gap: 11px; }
  button.key{
    font-family: var(--font-utility);
    background: var(--dune-2); border: 2px solid rgba(241,228,200,0.28); color: var(--text);
    border-radius: 12px; padding: 13px 0; font-size: 20px; cursor:pointer; user-select:none;
    transition: transform .06s ease, background .15s ease;
    box-shadow: 0 2px 0 rgba(0,0,0,0.35);
  }
  button.key:active{ transform: scale(0.95); background: var(--night-2); }

  /* digit keys styled as small stamped clay/sand tiles — echoes the livestock-mark
     origin of the glyphs themselves */
  button.key.digit{
    display:flex; align-items:center; justify-content:center; min-height: 64px;
    background: linear-gradient(165deg, var(--sand) 0%, var(--sand-dim) 100%);
    border: 2px solid #6B5C34;
    box-shadow: 0 3px 0 #6B5C34, inset 0 1px 0 rgba(255,255,255,0.5);
  }
  button.key.digit:active{ box-shadow: 0 1px 0 #6B5C34, inset 0 1px 0 rgba(255,255,255,0.5); transform: translateY(2px) scale(0.97); }
  button.key.digit img{ height: 42px; width:auto; mix-blend-mode: multiply; }
  button.key.digit .fallback{ font-size: 26px; color: var(--night); }

  button.key.op{ color: var(--ochre); font-size: 26px; font-weight:700; border-color: rgba(227,168,87,0.35); }
  button.key.equals{
    background: linear-gradient(165deg, var(--ochre) 0%, var(--ochre-dim) 100%);
    color: var(--night); font-weight:bold; border-color: #7A5726; font-size: 24px;
    box-shadow: 0 3px 0 #7A5726;
  }
  button.key.equals:active{ box-shadow: 0 1px 0 #7A5726; }
  button.key.clear{ color: var(--clay); border-color: rgba(193,80,46,0.4); }

  footer{ text-align:center; font-size: 11px; color: var(--text-muted); margin-top: 26px; line-height:1.7; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Songhay (__________)</div>
    <h1>Calculatrice MAIGUS</h1>
    <p>Affichage et saisie en droite-à-gauche (RTL).<br>Bon essai.</p>
  </header>

  <div class="card">
    <div class="display">
      <div class="expr-line seq" id="exprLine"></div>
      <div class="main-line seq" id="mainLine"></div>
      <span class="rtl-tag">RTL actif</span>
    </div>
    <div class="keypad" id="keypad"></div>
  </div>

  <footer>
    Fichier autonome — ESSAI & ADAPTATION.<br>
    OFFICIALISATION EN COURS...
  </footer>
</div>

  ];
  let digitImages = DEFAULT_IMAGES;
  let entry = '0';
  let previous = null;
  let operator = null;
  let justEvaluated = false;
  let exprText = '';

  // --- render helpers: build a right-to-left sequence of chars/images ---
  function buildSeq(container, str, unitClass, imgHeightClass){
    container.innerHTML = '';
    for(const ch of str){
      if(ch >= '0' && ch <= '9'){
        const idx = parseInt(ch,10);
        if(digitImages[idx]){
          const img = document.createElement('img');
          img.src = digitImages[idx];
          container.appendChild(img);
          continue;
        }
      }
      const span = document.createElement('span');
      if(ch === THOUSANDS_SEP){
        span.className = unitClass + ' sep';
        span.textContent = '\u00B7'; // point médian — repère visuel du groupement de 3
      } else if(ch === '.'){
        span.className = unitClass + ' dec';
        span.textContent = ',';
      } else {
        span.className = unitClass;
        span.textContent = (ch === '-' ? '−' : ch);
      }
      container.appendChild(span);
    }
  }

  function fmt(num){
    if(!isFinite(num)) return 'ERR';
    let s = Math.round(num * 1e10) / 1e10;
    return String(s);
  }
  function calculate(a,b,op){
    switch(op){
      case '+': return a+b;
      case '−': return a-b;
      case '×': return a*b;
      case '÷': return b===0 ? NaN : a/b;
    }
  }

  const THOUSANDS_SEP = '\u202F'; // espace fine — insérée entre les groupes de 3 chiffres
  function groupInteger(intPart){
    let out = '';
    for(let i=0;i<intPart.length;i++){
      if(i>0 && (intPart.length-i)%3===0) out += THOUSANDS_SEP;
      out += intPart[i];
    }
    return out;
  }
  function formatNumberToken(token){
    const neg = token.startsWith('-');
    if(neg) token = token.slice(1);
    const dot = token.indexOf('.');
    const intPart = dot===-1 ? token : token.slice(0,dot);
    const decPart = dot===-1 ? null : token.slice(dot+1);
    const grouped = groupInteger(intPart) + (decPart!==null ? '.'+decPart : '');
    return (neg?'-':'') + grouped;
  }
  function withThousands(str){
    return str.replace(/-?\d+(\.\d+)?/g, m => formatNumberToken(m));
  }

  function render(){
    buildSeq(document.getElementById('mainLine'), withThousands(entry), 'u');
    buildSeq(document.getElementById('exprLine'), withThousands(exprText), 'u');
  }

  function pressDigit(d){
    if(justEvaluated){ entry='0'; exprText=''; justEvaluated=false; }
    entry = (entry === '0') ? d : entry + d;
  }
  function pressDecimal(){
    if(justEvaluated){ entry='0'; exprText=''; justEvaluated=false; }
    if(!entry.includes('.')) entry += '.';
  }
  function pressOperator(op){
    if(operator && !justEvaluated){
      previous = calculate(previous, parseFloat(entry), operator);
    } else {
      previous = parseFloat(entry);
    }
    operator = op;
    exprText = fmt(previous) + op;
    entry = '0';
    justEvaluated = false;
  }
  function pressEquals(){
    if(operator === null) return;
    const b = parseFloat(entry);
    const result = calculate(previous, b, operator);
    exprText = fmt(previous) + operator + fmt(b) + '=';
    entry = isNaN(result) ? 'ERR' : fmt(result);
    previous = null; operator = null; justEvaluated = true;
  }
  function pressClear(){ entry='0'; previous=null; operator=null; exprText=''; justEvaluated=false; }
  function pressBackspace(){
    if(justEvaluated){ pressClear(); return; }
    entry = entry.length > 1 ? entry.slice(0,-1) : '0';
  }

  // --- build keypad ---
  const keypad = document.getElementById('keypad');
  const layout = [
    ['C','clear'], ['⌫','back'], [',','dec'], ['÷','op'],
    ['9','d'], ['8','d'], ['7','d'], ['×','op'],
    ['6','d'], ['5','d'], ['4','d'], ['−','op'],
    ['3','d'], ['2','d'], ['1','d'], ['+','op'],
    ['0','d'], ['=','eq']
  ];
  layout.forEach(([label,type])=>{
    const btn = document.createElement('button');
    btn.className = 'key';
    if(type==='clear'){ btn.classList.add('clear'); btn.textContent='C'; btn.onclick=()=>{pressClear(); render();}; }
    else if(type==='back'){ btn.textContent='⌫'; btn.onclick=()=>{pressBackspace(); render();}; }
    else if(type==='dec'){ btn.classList.add('op'); btn.textContent=','; btn.onclick=()=>{pressDecimal(); render();}; }
    else if(type==='op'){ btn.classList.add('op'); btn.textContent=label; btn.onclick=()=>{pressOperator(label); render();}; }
    else if(type==='eq'){ btn.classList.add('equals'); btn.textContent='='; btn.style.gridColumn='span 2'; btn.onclick=()=>{pressEquals(); render();}; }
    else if(type==='d'){
      const d = label;
      btn.classList.add('digit');
      btn.dataset.d = d;
      renderDigitButton(btn, d);
      if(d==='0') btn.style.gridColumn='span 2';
      btn.onclick=()=>{pressDigit(d); render();};
    }
    keypad.appendChild(btn);
  });

  function renderDigitButton(btn, d){
    const idx = parseInt(d,10);
    const img = digitImages[idx];
    btn.innerHTML = img
      ? `<img src="${img}">`
      : `<span class="fallback">${d}</span>`;
  }

  render();
})();
